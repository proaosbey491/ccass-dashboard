<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港股通CCASS异动日报</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0b1121;
            --card-bg: #151e32;
            --card-border: #1e293b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --up: #ef4444;
            --down: #22c55e;
            --warning: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 24px;
        }
        header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        header .meta { color: var(--text-muted); font-size: 14px; margin-top: 12px; }
        .date-picker {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 8px 16px;
            margin-top: 12px;
        }
        .date-picker label { font-size: 13px; color: var(--text-muted); }
        .date-picker select {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }
        .date-picker select:focus { border-color: var(--accent); }
        .date-picker .badge {
            background: var(--accent);
            color: #fff;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            font-size: 16px;
        }
        .error {
            text-align: center;
            padding: 40px 20px;
            color: var(--up);
            font-size: 14px;
            line-height: 1.8;
        }
        .error code {
            background: var(--card-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--text);
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }
        .kpi-card:hover { transform: translateY(-2px); }
        .kpi-value { font-size: 32px; font-weight: 700; margin: 8px 0; }
        .kpi-label { font-size: 13px; color: var(--text-muted); }
        .kpi-value.up { color: var(--up); }
        .kpi-value.down { color: var(--down); }
        .kpi-value.accent { color: var(--accent); }
        .kpi-value.warning { color: var(--warning); }
        .chart-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
        }
        .chart-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
        }
        .chart-container { width: 100%; height: 320px; }
        .full-width { grid-column: 1 / -1; }
        .summary-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .summary-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--accent);
        }
        .summary-section p { margin-bottom: 8px; color: var(--text-muted); }
        .summary-section ul { margin-left: 20px; color: var(--text-muted); }
        .summary-section li { margin-bottom: 6px; }
        .table-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            overflow-x: auto;
        }
        .table-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 10px 12px;
            text-align: right;
            border-bottom: 1px solid var(--card-border);
        }
        th {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        td:first-child, th:first-child { text-align: left; }
        tr:hover { background: rgba(59, 130, 246, 0.05); }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .tag-up { background: rgba(239, 68, 68, 0.2); color: var(--up); }
        .tag-down { background: rgba(34, 197, 94, 0.2); color: var(--down); }
        .tag-alert { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid var(--card-border);
        }
        .hidden { display: none; }
        @media (max-width: 768px) {
            .chart-row { grid-template-columns: 1fr; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-container { height: 260px; }
            .date-picker { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 港股通CCASS异动日报</h1>
            <div class="meta">
                <div class="date-picker">
                    <label>📅 选择日期</label>
                    <select id="date-select">
                        <option value="">加载中...</option>
                    </select>
                    <span id="latest-badge" class="badge hidden">最新</span>
                </div>
                <div id="current-date-info" style="margin-top:8px;color:#94a3b8;font-size:13px;"></div>
            </div>
        </header>

        <div id="loading" class="loading">正在加载数据...</div>
        <div id="error" class="error hidden"></div>

        <div id="dashboard" class="hidden">
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-label">监控股票总数</div>
                    <div class="kpi-value accent" id="kpi-total">-</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">CCASS 增持家数</div>
                    <div class="kpi-value up" id="kpi-inc">-</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">CCASS 减持家数</div>
                    <div class="kpi-value down" id="kpi-dec">-</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">股价上涨家数</div>
                    <div class="kpi-value up" id="kpi-price-up">-</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">股价下跌家数</div>
                    <div class="kpi-value down" id="kpi-price-down">-</div>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-card">
                    <h3>📈 CCASS 增持 Top 20</h3>
                    <div id="chart-increase" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>📉 CCASS 减持 Top 20</h3>
                    <div id="chart-decrease" class="chart-container"></div>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-card">
                    <h3>🥧 CCASS 持股变动分布</h3>
                    <div id="chart-pie" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>🎯 CCASS 变动 vs 股价变动</h3>
                    <div id="chart-scatter" class="chart-container"></div>
                </div>
            </div>

            <div class="summary-section">
                <h2>📝 异动摘要</h2>
                <div id="summary-content"></div>
            </div>

            <div class="table-section">
                <h3>📋 全部数据</h3>
                <table id="data-table">
                    <thead>
                        <tr>
                            <th data-sort="code" style="cursor:pointer;user-select:none;">股票代码 <span class="sort-indicator"></span></th>
                            <th data-sort="name" style="cursor:pointer;user-select:none;">股票名称 <span class="sort-indicator"></span></th>
                            <th data-sort="ccass_change" style="cursor:pointer;user-select:none;">CCASS变动 <span class="sort-indicator"></span></th>
                            <th data-sort="ccass_change_pct" style="cursor:pointer;user-select:none;">变动比例(%) <span class="sort-indicator"></span></th>
                            <th data-sort="ccass_pct" style="cursor:pointer;user-select:none;">CCASS占比(%) <span class="sort-indicator"></span></th>
                            <th data-sort="price" style="cursor:pointer;user-select:none;">最新价 <span class="sort-indicator"></span></th>
                            <th data-sort="price_change" style="cursor:pointer;user-select:none;">涨跌(%) <span class="sort-indicator"></span></th>
                            <th data-sort="volume" style="cursor:pointer;user-select:none;">成交量 <span class="sort-indicator"></span></th>
                            <th data-sort="turnover" style="cursor:pointer;user-select:none;">成交额 <span class="sort-indicator"></span></th>
                            <th data-sort="pe" style="cursor:pointer;user-select:none;">PE <span class="sort-indicator"></span></th>
                            <th>异动标记</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <footer>
            数据来源：香港交易所披露易、新浪财经 | 本报告仅供信息参考，不构成投资建议
        </footer>
    </div>

    <script>
        let charts = {};
        let currentTableData = [];
        let sortState = { column: null, direction: 'desc' };

        document.addEventListener('DOMContentLoaded', async () => {
            await loadManifest();
            bindTableSort();
        });

        function bindTableSort() {
            const headers = document.querySelectorAll('#data-table thead th[data-sort]');
            headers.forEach(th => {
                th.addEventListener('click', () => {
                    const column = th.dataset.sort;
                    if (sortState.column === column) {
                        sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortState.column = column;
                        sortState.direction = 'desc';
                    }
                    updateSortIndicators();
                    const sorted = sortData([...currentTableData], column, sortState.direction);
                    renderTable(sorted);
                });
            });
        }

        function updateSortIndicators() {
            document.querySelectorAll('#data-table thead th .sort-indicator').forEach(span => {
                span.textContent = '';
            });
            if (sortState.column) {
                const th = document.querySelector(`#data-table thead th[data-sort="${sortState.column}"]`);
                if (th) {
                    th.querySelector('.sort-indicator').textContent = sortState.direction === 'asc' ? ' ▲' : ' ▼';
                }
            }
        }

        function sortData(data, column, direction) {
            return data.sort((a, b) => {
                let valA = a[column];
                let valB = b[column];
                if (valA == null) valA = direction === 'asc' ? Infinity : -Infinity;
                if (valB == null) valB = direction === 'asc' ? Infinity : -Infinity;
                if (typeof valA === 'string') {
                    valA = valA.toLowerCase();
                    valB = valB.toLowerCase();
                }
                if (valA < valB) return direction === 'asc' ? -1 : 1;
                if (valA > valB) return direction === 'asc' ? 1 : -1;
                return 0;
            });
        }

        async function loadManifest() {
            try {
                const response = await fetch('data/manifest.json');
                if (!response.ok) throw new Error('无法加载 manifest.json');
                const manifest = await response.json();
                populateDatePicker(manifest.dates);
            } catch (err) {
                showError('加载日期列表失败：' + err.message);
            }
        }

        function populateDatePicker(dates) {
            const select = document.getElementById('date-select');
            select.innerHTML = '';

            if (dates.length === 0) {
                select.innerHTML = '<option value="">暂无数据</option>';
                showError('暂无历史数据，请先运行数据抓取脚本。');
                return;
            }

            dates.sort((a, b) => b.localeCompare(a));

            dates.forEach((date, index) => {
                const option = document.createElement('option');
                option.value = date;
                option.textContent = date;
                if (index === 0) option.selected = true;
                select.appendChild(option);
            });

            document.getElementById('latest-badge').classList.remove('hidden');
            loadDateData(dates[0]);

            select.addEventListener('change', (e) => {
                const selectedDate = e.target.value;
                const isLatest = selectedDate === dates[0];
                document.getElementById('latest-badge').classList.toggle('hidden', !isLatest);
                loadDateData(selectedDate);
            });
        }

        async function loadDateData(date) {
            showLoading();
            try {
                const response = await fetch(`data/data_${date}.json`);
                if (!response.ok) throw new Error(`数据文件不存在: data_${date}.json`);
                const data = await response.json();
                renderDashboard(data, date);
            } catch (err) {
                showError('加载 ' + date + ' 数据失败：' + err.message);
            }
        }

        function renderDashboard(data, date) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');

            const prevText = data.prev_date ? `对比日期：${data.prev_date}` : '无历史对比数据';
            document.getElementById('current-date-info').textContent = `统计日期：${date} | ${prevText}`;

            document.getElementById('kpi-total').textContent = data.kpi.total_stocks;
            document.getElementById('kpi-inc').textContent = data.kpi.increase_count;
            document.getElementById('kpi-dec').textContent = data.kpi.decrease_count;
            // unchanged_count removed from display
            document.getElementById('kpi-price-up').textContent = data.kpi.price_up_count;
            document.getElementById('kpi-price-down').textContent = data.kpi.price_down_count;

            renderIncreaseChart(data.increase);
            renderDecreaseChart(data.decrease);
            renderPieChart(data.pie);
            renderScatterChart(data.scatter);

            document.getElementById('summary-content').innerHTML = data.summary_html;
            currentTableData = data.all || [];
            sortState = { column: null, direction: 'desc' };
            updateSortIndicators();
            renderTable(currentTableData);
            // 确保图表在容器显示后正确渲染
            setTimeout(() => {
                Object.values(charts).forEach(chart => chart.resize());
            }, 100);
        }

        function renderIncreaseChart(increaseData) {
            const chart = getChart('chart-increase');
            const inc = increaseData.slice(0, 20);
            chart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: p => p[0].name + '<br/>增持: ' + p[0].value.toLocaleString() + ' 股'
                },
                grid: { left: '3%', right: '4%', bottom: '3%', top: '3%', containLabel: true },
                xAxis: { type: 'value', axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
                yAxis: {
                    type: 'category',
                    data: inc.map(d => d.name).reverse(),
                    axisLabel: { color: '#e2e8f0', fontSize: 11 },
                    axisLine: { lineStyle: { color: '#1e293b' } }
                },
                series: [{
                    type: 'bar',
                    data: inc.map(d => d.value).reverse(),
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#ef4444' },
                            { offset: 1, color: '#f87171' }
                        ]),
                        borderRadius: [0, 4, 4, 0]
                    }
                }]
            }, true);
        }

        function renderDecreaseChart(decreaseData) {
            const chart = getChart('chart-decrease');
            const dec = decreaseData.slice(0, 20);
            chart.setOption({
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: p => p[0].name + '<br/>减持: ' + Math.abs(p[0].value).toLocaleString() + ' 股'
                },
                grid: { left: '3%', right: '4%', bottom: '3%', top: '3%', containLabel: true },
                xAxis: { type: 'value', axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#1e293b' } } },
                yAxis: {
                    type: 'category',
                    data: dec.map(d => d.name).reverse(),
                    axisLabel: { color: '#e2e8f0', fontSize: 11 },
                    axisLine: { lineStyle: { color: '#1e293b' } }
                },
                series: [{
                    type: 'bar',
                    data: dec.map(d => d.value).reverse(),
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#22c55e' },
                            { offset: 1, color: '#4ade80' }
                        ]),
                        borderRadius: [0, 4, 4, 0]
                    }
                }]
            }, true);
        }

        function renderPieChart(pieData) {
            const chart = getChart('chart-pie');
            chart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                legend: { orient: 'vertical', left: 'left', textStyle: { color: '#e2e8f0' } },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['60%', '50%'],
                    avoidLabelOverlap: false,
                    itemStyle: { borderRadius: 6, borderColor: '#151e32', borderWidth: 2 },
                    label: { show: false },
                    emphasis: { label: { show: true, fontSize: 14, fontWeight: 'bold', color: '#e2e8f0' } },
                    data: pieData
                }]
            }, true);
        }

        function renderScatterChart(scatterData) {
            const chart = getChart('chart-scatter');
            const sData = scatterData.map(d => [d.ccass_change_pct, d.price_change_pct, d.name, d.ccass_change]);
            chart.setOption({
                tooltip: {
                    formatter: p => p.data[2] + '<br/>CCASS变动: ' + (p.data[3] > 0 ? '+' : '') + p.data[3].toLocaleString() + ' 股<br/>CCASS变动比例: ' + p.data[0].toFixed(3) + '%<br/>股价变动: ' + p.data[1].toFixed(2) + '%'
                },
                grid: { left: '10%', right: '10%', bottom: '10%', top: '10%' },
                xAxis: {
                    name: 'CCASS变动(%)',
                    nameTextStyle: { color: '#94a3b8' },
                    axisLabel: { color: '#94a3b8' },
                    splitLine: { lineStyle: { color: '#1e293b' } },
                    axisLine: { lineStyle: { color: '#1e293b' } }
                },
                yAxis: {
                    name: '股价变动(%)',
                    nameTextStyle: { color: '#94a3b8' },
                    axisLabel: { color: '#94a3b8' },
                    splitLine: { lineStyle: { color: '#1e293b' } },
                    axisLine: { lineStyle: { color: '#1e293b' } }
                },
                series: [{
                    type: 'scatter',
                    symbolSize: d => Math.min(Math.max(Math.abs(d[3]) / 500000 + 6, 6), 30),
                    data: sData,
                    itemStyle: {
                        color: d => d[3] > 0 ? '#ef4444' : '#22c55e',
                        opacity: 0.8
                    }
                }]
            }, true);
        }

        function renderTable(allData) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            allData.forEach(row => {
                const tr = document.createElement('tr');
                const changeTag = row.ccass_change > 0 ? '<span class="tag tag-up">增持</span>' :
                                  row.ccass_change < 0 ? '<span class="tag tag-down">减持</span>' : '';
                const priceTag = row.price_change > 0 ? '<span class="tag tag-up">+' + row.price_change.toFixed(2) + '%</span>' :
                                 row.price_change < 0 ? '<span class="tag tag-down">' + row.price_change.toFixed(2) + '%</span>' : '';
                const alertTags = row.alert ? row.alert.split(';').filter(a => a).map(a => '<span class="tag tag-alert">' + a + '</span>').join(' ') : '';

                tr.innerHTML = `
                    <td><strong>${row.code}</strong></td>
                    <td>${row.name}</td>
                    <td>${row.ccass_change != null ? row.ccass_change.toLocaleString() : '-'}</td>
                    <td>${row.ccass_change_pct != null ? row.ccass_change_pct.toFixed(3) : '-'}</td>
                    <td>${row.ccass_pct != null ? row.ccass_pct.toFixed(2) : '-'}</td>
                    <td>${row.price != null ? row.price.toFixed(2) : '-'}</td>
                    <td>${priceTag}</td>
                    <td>${row.volume != null ? row.volume.toLocaleString() : '-'}</td>
                    <td>${row.turnover != null ? (row.turnover / 1e8).toFixed(2) + '亿' : '-'}</td>
                    <td>${row.pe != null ? row.pe.toFixed(2) : '-'}</td>
                    <td>${changeTag} ${alertTags}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getChart(id) {
            if (!charts[id]) {
                charts[id] = echarts.init(document.getElementById(id));
            }
            return charts[id];
        }

        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('dashboard').classList.add('hidden');
        }

        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');

            const isFileProtocol = window.location.protocol === 'file:';
            let fullMsg = msg;
            if (isFileProtocol) {
                fullMsg += `<br><br><strong>💡 提示</strong>：你正在通过 file:// 协议直接打开本文件，浏览器安全策略会阻止加载本地 JSON 数据。<br><br>
                请通过以下任一方式访问：<br>
                1. <strong>命令行启动本地服务器</strong>：在 <code>ccass_reports_v2</code> 目录下运行：<br>
                &nbsp;&nbsp;&nbsp;&nbsp;<code>python3 -m http.server 8000</code><br>
                &nbsp;&nbsp;&nbsp;&nbsp;然后在浏览器打开 <code>http://localhost:8000</code><br>
                2. <strong>VS Code Live Server</strong> 插件<br>
                3. 将文件部署到任何静态托管服务（GitHub Pages、Vercel 等）`;
            }
            document.getElementById('error').innerHTML = fullMsg;
        }

        window.addEventListener('resize', () => {
            Object.values(charts).forEach(chart => chart.resize());
        });
    </script>
</body>
